schema_version: sir.provider.v0
name: sir-otlp-exporter
kind: export_provider
version: 0.1.0
protocol: stdio-json
entrypoint: ./provider.py
platforms: [macos, linux, windows]
capabilities:
  export: true
  format: otlp-json
  otlp: true
  endpoint_env: OTLP_ENDPOINT
  redacted_by_default: true
fixtures:
  - fixtures/effect-export.json
